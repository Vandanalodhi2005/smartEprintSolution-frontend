<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Your Order | Smart ePrint Solution</title>
    <meta name="description" content="Track your Smart ePrint order status in real-time. Enter your order ID and email to see your delivery progress." />
    <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body>
    <div id="root">
        <section style="padding: 80px 20px; background: #fdf2f2; text-align: center; min-height: 400px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 20px;">Track Your Shipment</h1>
            <p style="color: #666; margin-bottom: 40px;">Enter your details below to see the current status of your order.</p>
            
            <div style="max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: left;">
                <label style="display: block; font-weight: bold; margin-bottom: 10px;">Order ID</label>
                <div style="width: 100%; height: 50px; background: #f1f5f9; border-radius: 10px; margin-bottom: 20px;"></div>
                
                <label style="display: block; font-weight: bold; margin-bottom: 10px;">Email Address</label>
                <div style="width: 100%; height: 50px; background: #f1f5f9; border-radius: 10px; margin-bottom: 30px;"></div>
                
                <div style="width: 100%; height: 50px; background: #EF4056; border-radius: 10px;"></div>
            </div>
        </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
